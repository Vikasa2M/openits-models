syntax = "proto3";

package openits.signal_control.v1;

option go_package = "github.com/Vikasa2M/openits-models/pkg/proto/openits/signal_control/v1;signalcontrolv1";

import "google/protobuf/timestamp.proto";

message SignalController {
  SignalControllerConfig config = 1;
  SignalControllerState state = 2;
  Startup startup = 14;
  Phases phases = 3;
  Detectors detectors = 4;
  Overlaps overlaps = 9;
  Channels channels = 10;
  ConflictMonitor conflict_monitor = 11;
  Coordination coordination = 5;
  Sequences sequences = 15;
  Timebase timebase = 12;
  Preemption preemption = 6;
  Priority priority = 16;
  Operation operation = 7;
  CabinetPower cabinet_power = 13;
  Faults faults = 8;
}

message SignalControllerConfig {
  string elevation = 1;
  uint32 heading = 2;
  string id = 3;
  google.protobuf.Timestamp install_date = 8;
  string latitude = 4;
  SignalControllerConfigLinearReference linear_reference = 9;
  string longitude = 5;
  string maintained_by = 10;
  string name = 6;
  string owner = 11;
  string road_reference = 7;
  string site_id = 12;
}

message SignalControllerConfigLinearReference {
  string route_designator = 1;
  string direction = 2;
  string measure = 3;
  string lrs_method = 4;
}

message SignalControllerState {
  string elevation = 1;
  string firmware = 2;
  string firmware_build = 12;
  string hardware_version = 13;
  uint32 heading = 3;
  string id = 4;
  google.protobuf.Timestamp install_date = 14;
  string latitude = 5;
  SignalControllerStateLinearReference linear_reference = 15;
  string longitude = 6;
  string maintained_by = 16;
  string make = 7;
  string model = 8;
  string name = 9;
  string owner = 17;
  string road_reference = 10;
  string serial = 11;
  string site_id = 18;
}

message SignalControllerStateLinearReference {
  string route_designator = 1;
  string direction = 2;
  string measure = 3;
  string lrs_method = 4;
}

message Startup {
  uint32 flash_duration_seconds = 1;
  repeated uint32 flash_phases = 2;
  uint32 all_red_duration_seconds = 3;
}

message Phases {
  repeated Phase phase = 1;
}

message Phase {
  uint32 phase_number = 1;
  PhaseConfig config = 2;
  PhaseState state = 3;
}

message PhaseConfig {
  uint32 phase_number = 1;
  bool enabled = 2;
  uint32 ring = 3;
  uint32 barrier = 4;
  Timing timing = 5;
  string max_green_2 = 6;
  string red_revert = 9;
  string crossing_distance_m = 10;
  string leading_ped_interval_seconds = 11;
  Options options = 7;
  VolumeDensity volume_density = 8;
}

message Timing {
  string max_green = 1;
  string min_green = 2;
  string passage = 3;
  uint32 ped_clear = 4;
  string red_clear = 5;
  uint32 walk = 6;
  string yellow_change = 7;
}

message Options {
  bool min_recall = 1;
  bool max_recall = 2;
  bool ped_recall = 3;
  bool soft_recall = 4;
  bool dual_entry = 5;
  bool rest_in_walk = 6;
  bool simultaneous_gap = 7;
  bool call_to_nonactuated = 8;
}

message VolumeDensity {
  string added_initial = 1;
  uint32 max_initial = 2;
  uint32 time_before_reduction = 3;
  uint32 time_to_reduce = 4;
  string min_gap = 5;
}

message PhaseState {
  uint32 next_phase = 3;
  PedIntervalType ped_interval = 4;
  uint32 ped_interval_elapsed_ms = 5;
  VehIntervalType vehicle_interval = 6;
  uint32 vehicle_interval_elapsed_ms = 7;
}

enum PedIntervalType {
  PED_INTERVAL_TYPE_UNSPECIFIED = 0;
  PED_INTERVAL_TYPE_WALK = 1;
  PED_INTERVAL_TYPE_PED_CLEAR = 2;
  PED_INTERVAL_TYPE_DONT_WALK = 3;
  PED_INTERVAL_TYPE_DARK = 4;
  PED_INTERVAL_TYPE_NONE = 5;
}

enum VehIntervalType {
  VEH_INTERVAL_TYPE_UNSPECIFIED = 0;
  VEH_INTERVAL_TYPE_GREEN = 1;
  VEH_INTERVAL_TYPE_YELLOW_CHANGE = 2;
  VEH_INTERVAL_TYPE_RED_CLEAR = 3;
  VEH_INTERVAL_TYPE_RED = 4;
  VEH_INTERVAL_TYPE_DARK = 5;
}

message Detectors {
  repeated DetectorsDetector detector = 1;
}

message DetectorsDetector {
  uint32 detector_id = 1;
  DetectorsDetectorConfig config = 2;
  DetectorsDetectorState state = 3;
}

message DetectorsDetectorConfig {
  uint32 detector_id = 1;
  string type = 2;
  repeated uint32 assigned_phases = 3;
  bool enabled = 4;
  uint32 delay = 5;
  string extend = 6;
  DetectorMode mode = 7;
  repeated uint32 extend_phases = 8;
  DetectorFailAction fail_action = 9;
  Diagnostics diagnostics = 10;
}

enum DetectorMode {
  DETECTOR_MODE_UNSPECIFIED = 0;
  DETECTOR_MODE_PRESENCE = 1;
  DETECTOR_MODE_PULSE = 2;
}

enum DetectorFailAction {
  DETECTOR_FAIL_ACTION_UNSPECIFIED = 0;
  DETECTOR_FAIL_ACTION_NONE = 1;
  DETECTOR_FAIL_ACTION_MIN_RECALL = 2;
  DETECTOR_FAIL_ACTION_MAX_RECALL = 3;
  DETECTOR_FAIL_ACTION_MAX_PRESENCE = 4;
}

message Diagnostics {
  uint32 no_activity_minutes = 1;
  uint32 max_presence_minutes = 2;
  uint32 erratic_counts_per_minute = 3;
}

message DetectorsDetectorState {
  bool active = 1;
  google.protobuf.Timestamp last_activation = 2;
  uint64 actuation_count = 3;
  bool fault = 4;
  Measurement measurement = 5;
}

message Measurement {
  uint64 volume = 1;
  string occupancy = 2;
  string speed_kmh = 3;
  uint32 collection_period_seconds = 4;
  google.protobuf.Timestamp collected_at = 5;
}

message Overlaps {
  repeated Overlap overlap = 1;
}

message Overlap {
  uint32 overlap_number = 4;
  OverlapConfig config = 2;
  OverlapState state = 3;
}

message OverlapConfig {
  uint32 overlap_number = 9;
  string name = 2;
  string type = 3;
  repeated uint32 included_phases = 4;
  repeated uint32 modifier_phases = 10;
  string trailing_green = 5;
  string trailing_yellow = 6;
  string trailing_red_clear = 7;
  Fya fya = 8;
}

message Fya {
  uint32 protected_left_phase = 1;
  uint32 opposing_through_phase = 2;
}

message OverlapState {
  OverlapIntervalType current_interval = 1;
  bool active = 2;
}

enum OverlapIntervalType {
  OVERLAP_INTERVAL_TYPE_UNSPECIFIED = 0;
  OVERLAP_INTERVAL_TYPE_GREEN = 1;
  OVERLAP_INTERVAL_TYPE_TRAILING_GREEN = 2;
  OVERLAP_INTERVAL_TYPE_YELLOW = 3;
  OVERLAP_INTERVAL_TYPE_RED_CLEARANCE = 4;
  OVERLAP_INTERVAL_TYPE_OFF = 5;
  OVERLAP_INTERVAL_TYPE_DARK = 6;
  OVERLAP_INTERVAL_TYPE_FLASHING_YELLOW_ARROW = 7;
}

message Channels {
  repeated Channel channel = 1;
}

message Channel {
  uint32 channel_number = 1;
  oneof source {
    uint32 phase = 2;
    uint32 overlap = 3;
  }
  string movement = 4;
  ChannelFlashState flash_state = 5;
}

enum ChannelFlashState {
  CHANNEL_FLASH_STATE_UNSPECIFIED = 0;
  CHANNEL_FLASH_STATE_RED = 1;
  CHANNEL_FLASH_STATE_YELLOW = 2;
  CHANNEL_FLASH_STATE_NONE = 3;
}

message ConflictMonitor {
  repeated Permissive permissive = 1;
}

message Permissive {
  uint32 channel_a = 1;
  uint32 channel_b = 2;
}

message Coordination {
  repeated TimingPlan timing_plan = 1;
  CoordinationState state = 2;
}

message TimingPlan {
  uint32 plan_id = 1;
  uint32 cycle_length = 2;
  uint32 offset = 3;
  repeated uint32 coordinated_phases = 5;
  OffsetReference offset_reference = 6;
  TransitionMode transition_mode = 7;
  ForceOffMode force_off_mode = 8;
  uint32 sequence_id = 9;
  repeated Split split = 4;
}

enum OffsetReference {
  OFFSET_REFERENCE_UNSPECIFIED = 0;
  OFFSET_REFERENCE_BEGIN_OF_GREEN = 1;
  OFFSET_REFERENCE_BEGIN_OF_YELLOW = 2;
  OFFSET_REFERENCE_END_OF_GREEN = 3;
}

enum TransitionMode {
  TRANSITION_MODE_UNSPECIFIED = 0;
  TRANSITION_MODE_DWELL = 1;
  TRANSITION_MODE_SHORTWAY = 2;
  TRANSITION_MODE_ADD_ONLY = 3;
  TRANSITION_MODE_SUBTRACT_ONLY = 4;
}

enum ForceOffMode {
  FORCE_OFF_MODE_UNSPECIFIED = 0;
  FORCE_OFF_MODE_FIXED = 1;
  FORCE_OFF_MODE_FLOATING = 2;
}

message Split {
  uint32 phase_number = 1;
  uint32 split_seconds = 2;
  SplitMode split_mode = 3;
}

enum SplitMode {
  SPLIT_MODE_UNSPECIFIED = 0;
  SPLIT_MODE_OTHER = 1;
  SPLIT_MODE_MINIMUM_RECALL = 2;
  SPLIT_MODE_MAXIMUM_RECALL = 3;
  SPLIT_MODE_PED_RECALL = 4;
  SPLIT_MODE_COORDINATED_FIXED = 5;
  SPLIT_MODE_COORDINATED_FLOATING = 6;
  SPLIT_MODE_PHASE_OMIT = 7;
  SPLIT_MODE_NONE = 8;
}

message CoordinationState {
  uint32 active_plan = 1;
  CycleState cycle_state = 2;
}

enum CycleState {
  CYCLE_STATE_FREE = 0;
  CYCLE_STATE_IN_STEP = 1;
  CYCLE_STATE_TRANSITION_ADD = 2;
  CYCLE_STATE_TRANSITION_SUBTRACT = 3;
  CYCLE_STATE_TRANSITION_DWELL = 4;
}

message Sequences {
  repeated Sequence sequence = 1;
}

message Sequence {
  uint32 sequence_id = 1;
  string name = 2;
  repeated RingSequence ring_sequence = 3;
}

message RingSequence {
  uint32 ring = 1;
  repeated uint32 ordered_phases = 2;
}

message Timebase {
  string timezone = 4;
  bool observe_dst = 5;
  repeated DayPlan day_plan = 1;
  repeated ScheduleEntry schedule_entry = 2;
  Clock clock = 3;
}

message DayPlan {
  uint32 day_plan_id = 1;
  string name = 2;
  repeated Action action = 3;
}

message Action {
  string start_time = 1;
  oneof activate {
    uint32 timing_plan = 2;
    SpecialOperation special_operation = 3;
  }
}

enum SpecialOperation {
  SPECIAL_OPERATION_UNSPECIFIED = 0;
  SPECIAL_OPERATION_FREE = 1;
  SPECIAL_OPERATION_FLASH = 2;
}

message ScheduleEntry {
  uint32 schedule_id = 1;
  repeated Months months = 2;
  repeated DaysOfWeek days_of_week = 3;
  repeated uint32 days_of_month = 4;
  uint32 day_plan = 5;
}

enum Months {
  MONTHS_UNSPECIFIED = 0;
  MONTHS_JANUARY = 1;
  MONTHS_FEBRUARY = 2;
  MONTHS_MARCH = 3;
  MONTHS_APRIL = 4;
  MONTHS_MAY = 5;
  MONTHS_JUNE = 6;
  MONTHS_JULY = 7;
  MONTHS_AUGUST = 8;
  MONTHS_SEPTEMBER = 9;
  MONTHS_OCTOBER = 10;
  MONTHS_NOVEMBER = 11;
  MONTHS_DECEMBER = 12;
}

enum DaysOfWeek {
  DAYS_OF_WEEK_UNSPECIFIED = 0;
  DAYS_OF_WEEK_MONDAY = 1;
  DAYS_OF_WEEK_TUESDAY = 2;
  DAYS_OF_WEEK_WEDNESDAY = 3;
  DAYS_OF_WEEK_THURSDAY = 4;
  DAYS_OF_WEEK_FRIDAY = 5;
  DAYS_OF_WEEK_SATURDAY = 6;
  DAYS_OF_WEEK_SUNDAY = 7;
}

message Clock {
  google.protobuf.Timestamp current_time = 1;
  string time_source = 2;
  SyncStatus sync_status = 3;
  int32 offset_ms = 4;
}

enum SyncStatus {
  SYNC_STATUS_UNSPECIFIED = 0;
  SYNC_STATUS_SYNCED = 1;
  SYNC_STATUS_HOLDOVER = 2;
  SYNC_STATUS_UNSYNCED = 3;
  SYNC_STATUS_FREE_RUNNING = 4;
}

message Preemption {
  repeated Preemptor preemptor = 4;
}

message Preemptor {
  uint32 preemptor_id = 1;
  PreemptorConfig config = 2;
  PreemptorState state = 3;
}

message PreemptorConfig {
  uint32 preemptor_id = 1;
  string type = 2;
  uint32 priority_order = 3;
  uint32 delay_seconds = 4;
  uint32 min_green_before_entry = 5;
  uint32 min_walk_before_entry = 6;
  uint32 min_ped_clear_before_entry = 12;
  TrackClearance track_clearance = 7;
  repeated uint32 dwell_phases = 8;
  uint32 min_dwell_seconds = 9;
  uint32 flash_dwell_seconds = 13;
  repeated uint32 exit_phases = 10;
  uint32 max_presence_seconds = 11;
}

message TrackClearance {
  repeated uint32 phases = 1;
  uint32 green_seconds = 2;
}

message PreemptorState {
  bool active = 1;
  google.protobuf.Timestamp active_since = 2;
  PreemptStage current_stage = 3;
  string source_id = 4;
}

enum PreemptStage {
  PREEMPT_STAGE_UNSPECIFIED = 0;
  PREEMPT_STAGE_NONE = 1;
  PREEMPT_STAGE_DELAY = 2;
  PREEMPT_STAGE_ENTRY = 3;
  PREEMPT_STAGE_TRACK_CLEARANCE = 4;
  PREEMPT_STAGE_DWELL = 5;
  PREEMPT_STAGE_EXIT = 6;
  PREEMPT_STAGE_MAX_PRESENCE = 7;
}

message Priority {
  repeated Strategy strategy = 1;
  PriorityState state = 2;
}

message Strategy {
  uint32 strategy_id = 1;
  StrategyConfig config = 2;
}

message StrategyConfig {
  uint32 strategy_id = 1;
  PriorityType priority_class = 2;
  uint32 max_early_green_seconds = 3;
  uint32 max_green_extension_seconds = 4;
  uint32 reservice_interval_seconds = 5;
  repeated uint32 served_phases = 6;
}

enum PriorityType {
  PRIORITY_TYPE_NONE = 0;
  PRIORITY_TYPE_TRANSIT = 1;
  PRIORITY_TYPE_FREIGHT = 2;
  PRIORITY_TYPE_OTHER = 3;
}

message PriorityState {
  repeated ActiveRequest active_request = 1;
}

message ActiveRequest {
  string request_id = 1;
  PriorityType priority_type = 2;
  string vehicle_id = 3;
  Stage stage = 4;
  uint32 strategy_id = 5;
}

enum Stage {
  STAGE_UNSPECIFIED = 0;
  STAGE_REQUESTED = 1;
  STAGE_GRANTED = 2;
  STAGE_ACTIVE = 3;
  STAGE_COMPLETED = 4;
  STAGE_DENIED = 5;
}

message Operation {
  string mode = 1;
  bool flash_active = 2;
  string flash_cause = 3;
  Mmu mmu = 4;
  google.protobuf.Timestamp last_mode_change = 5;
}

message Mmu {
  string fault_type = 1;
  repeated uint32 faulting_channels = 2;
  bool latched = 3;
}

message CabinetPower {
  Battery battery = 1;
  bool door_open = 2;
  Generator generator = 3;
  string line_frequency_hz = 4;
  string line_voltage_v = 5;
  OnBatteryPolicy on_battery_policy = 9;
  bool police_panel_open = 6;
  PowerSource power_source = 7;
  SignalOperationOnBattery signal_operation_on_battery = 10;
  uint32 transfer_count = 8;
}

message Battery {
  uint32 state_of_charge_pct = 1;
  uint32 runtime_remaining_minutes = 2;
  string voltage_v = 3;
  string temperature_c = 4;
  bool charger_fault = 5;
  TestState test_state = 6;
  google.protobuf.Timestamp last_test = 7;
}

enum TestState {
  TEST_STATE_IDLE = 0;
  TEST_STATE_IN_PROGRESS = 1;
  TEST_STATE_PASSED = 2;
  TEST_STATE_FAILED = 3;
}

message Generator {
  bool running = 1;
  uint32 fuel_level_pct = 2;
}

message OnBatteryPolicy {
  Mode mode = 1;
  uint32 transition_at_soc_pct = 2;
  uint32 transition_at_runtime_minutes = 3;
}

enum Mode {
  MODE_FULL_OPERATION = 0;
  MODE_FLASH = 1;
}

enum PowerSource {
  POWER_SOURCE_ON_LINE = 0;
  POWER_SOURCE_ON_BATTERY = 1;
  POWER_SOURCE_BYPASS = 2;
  POWER_SOURCE_OFF = 3;
}

enum SignalOperationOnBattery {
  SIGNAL_OPERATION_ON_BATTERY_FULL_OPERATION = 0;
  SIGNAL_OPERATION_ON_BATTERY_FLASH = 1;
  SIGNAL_OPERATION_ON_BATTERY_NOT_ON_BATTERY = 2;
}

message Faults {
  repeated Fault fault = 1;
}

message Fault {
  string category = 1;
  string correlates_with = 6;
  string description = 2;
  string fault_id = 3;
  google.protobuf.Timestamp first_observed = 4;
  OpenitsSignalControlFaultSeverity severity = 5;
}

enum OpenitsSignalControlFaultSeverity {
  OPENITS_SIGNAL_CONTROL_FAULT_SEVERITY_INFO = 0;
  OPENITS_SIGNAL_CONTROL_FAULT_SEVERITY_WARNING = 1;
  OPENITS_SIGNAL_CONTROL_FAULT_SEVERITY_MINOR = 2;
  OPENITS_SIGNAL_CONTROL_FAULT_SEVERITY_MAJOR = 3;
  OPENITS_SIGNAL_CONTROL_FAULT_SEVERITY_CRITICAL = 4;
}


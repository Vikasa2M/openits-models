syntax = "proto3";

package openits.rsu.v1;

option go_package = "github.com/openits/openits-models/pkg/proto/openits/rsu/v1;rsuv1";

import "google/protobuf/timestamp.proto";

message RsuBroadcastSample {
  string kind = 99;
  uint32 sample_window_s = 2;
  repeated Broadcast broadcast = 3;
  string observed_by = 5;
  google.protobuf.Timestamp occurred_at = 4;
  string owner = 6;
  uint64 sequence = 7;
  string source_device_id = 1;
}

message Broadcast {
  string msg_id = 1;
  string msg_type = 2;
  string rate_hz = 4;
  uint32 priority = 5;
  string channel_id = 6;
  uint32 dsrc_channel_number = 7;
}

message RsuCertificateExpiring {
  string kind = 99;
  string certificate_id = 2;
  string certificate_type = 3;
  uint32 days_until_expiry = 4;
  google.protobuf.Timestamp expiry_date = 5;
  string observed_by = 7;
  google.protobuf.Timestamp occurred_at = 8;
  string owner = 9;
  uint64 sequence = 10;
  string source_device_id = 11;
}

message RsuChannelFault {
  string kind = 99;
  string fault_type = 3;
  string message = 4;
  string channel_id = 11;
  uint32 dsrc_channel_number = 12;
  string observed_by = 6;
  google.protobuf.Timestamp occurred_at = 7;
  string owner = 8;
  uint64 sequence = 9;
  string source_device_id = 10;
}

message RsuGpsStatusChange {
  string kind = 99;
  GpsFixStatus previous_status = 2;
  GpsFixStatus new_status = 3;
  uint32 satellites = 4;
  string observed_by = 6;
  google.protobuf.Timestamp occurred_at = 7;
  string owner = 8;
  uint64 sequence = 9;
  string source_device_id = 10;
}

enum GpsFixStatus {
  GPS_FIX_STATUS_NO_FIX = 0;
  GPS_FIX_STATUS_FIX_2D = 1;
  GPS_FIX_STATUS_FIX_3D = 2;
  GPS_FIX_STATUS_DGPS = 3;
  GPS_FIX_STATUS_RTK = 4;
}

message RsuSecurityEvent {
  string kind = 99;
  string event_type = 2;
  string source = 3;
  string message = 4;
  string observed_by = 6;
  google.protobuf.Timestamp occurred_at = 7;
  string owner = 8;
  uint64 sequence = 9;
  string source_device_id = 10;
}

message RsuSrmReceived {
  string kind = 99;
  string request_id = 2;
  string vehicle_id = 3;
  string request_type = 4;
  uint32 approach = 5;
  uint32 eta_seconds = 6;
  string vehicle_class = 7;
  string observed_by = 9;
  google.protobuf.Timestamp occurred_at = 10;
  string owner = 11;
  uint64 sequence = 12;
  string source_device_id = 13;
}

message RsuSrmStatusChange {
  string kind = 99;
  string request_id = 2;
  string vehicle_id = 3;
  SrmRequestStatus previous_status = 4;
  SrmRequestStatus new_status = 5;
  DecisionAuthority decision_authority = 1;
  string observed_by = 7;
  google.protobuf.Timestamp occurred_at = 8;
  string owner = 9;
  uint64 sequence = 10;
  string source_device_id = 11;
}

enum SrmRequestStatus {
  SRM_REQUEST_STATUS_PENDING = 0;
  SRM_REQUEST_STATUS_APPROVED = 1;
  SRM_REQUEST_STATUS_ACTIVE = 2;
  SRM_REQUEST_STATUS_COMPLETED = 3;
  SRM_REQUEST_STATUS_DENIED = 4;
}

enum DecisionAuthority {
  DECISION_AUTHORITY_NONE = 0;
  DECISION_AUTHORITY_CONTROLLER_PRS = 1;
  DECISION_AUTHORITY_RSU_LOCAL = 2;
  DECISION_AUTHORITY_OPERATOR = 3;
  DECISION_AUTHORITY_EVP_AUTO = 4;
}

message RsuTimBroadcast {
  string kind = 99;
  string msg_id = 1;
  uint32 priority = 3;
  string channel_id = 10;
  uint32 dsrc_channel_number = 11;
  string observed_by = 5;
  google.protobuf.Timestamp occurred_at = 6;
  string owner = 7;
  uint64 sequence = 8;
  string source_device_id = 9;
}

message RsuTimBroadcastStateChanged {
  string kind = 99;
  Prior prior = 1;
  Current current = 2;
  uint32 active_tim_count = 3;
  string observed_by = 5;
  google.protobuf.Timestamp occurred_at = 6;
  string owner = 7;
  uint64 sequence = 8;
  string source_device_id = 9;
}

enum Prior {
  PRIOR_IDLE = 0;
  PRIOR_ACTIVE = 1;
  PRIOR_FAULT = 2;
}

enum Current {
  CURRENT_IDLE = 0;
  CURRENT_ACTIVE = 1;
  CURRENT_FAULT = 2;
}

message RsuTimCleared {
  string kind = 99;
  string msg_id = 1;
  Reason reason = 2;
  string observed_by = 4;
  google.protobuf.Timestamp occurred_at = 5;
  string owner = 6;
  uint64 sequence = 7;
  string source_device_id = 8;
}

enum Reason {
  REASON_EXPIRED = 0;
  REASON_CLEARED_BY_OPERATOR = 1;
  REASON_SUPERSEDED = 2;
  REASON_RSU_RESTART = 3;
  REASON_OTHER = 4;
}

message RsuTimLoaded {
  string kind = 99;
  string msg_id = 1;
  string source = 2;
  uint32 priority = 3;
  uint32 duration_seconds = 4;
  google.protobuf.Timestamp start_time = 5;
  string content_summary = 6;
  string observed_by = 8;
  google.protobuf.Timestamp occurred_at = 9;
  string owner = 10;
  uint64 sequence = 11;
  string source_device_id = 12;
}


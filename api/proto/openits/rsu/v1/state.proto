syntax = "proto3";

package openits.rsu.v1;

option go_package = "github.com/openits/openits-models/pkg/proto/openits/rsu/v1;rsuv1";

import "google/protobuf/timestamp.proto";

message Rsu {
  RsuConfig config = 1;
  RsuState state = 2;
  Operating operating = 12;
  Gnss gnss = 11;
  StoreForward store_forward = 3;
  Diagnostics diagnostics = 4;
  System system = 5;
  Faults faults = 13;
  Channels channels = 6;
  Messages messages = 7;
  RsuSecurity security = 8;
}

message RsuConfig {
  string elevation = 1;
  uint32 heading = 2;
  string id = 3;
  google.protobuf.Timestamp install_date = 8;
  string latitude = 4;
  RsuConfigLinearReference linear_reference = 9;
  string longitude = 5;
  string maintained_by = 10;
  string name = 6;
  string owner = 11;
  string road_reference = 7;
  string site_id = 12;
}

message RsuConfigLinearReference {
  string route_designator = 1;
  string direction = 2;
  string measure = 3;
  string lrs_method = 4;
}

message RsuState {
  string elevation = 1;
  string firmware = 8;
  string firmware_build = 9;
  string hardware_version = 10;
  uint32 heading = 2;
  string id = 3;
  google.protobuf.Timestamp install_date = 14;
  string latitude = 4;
  RsuStateLinearReference linear_reference = 15;
  string longitude = 5;
  string maintained_by = 16;
  string make = 11;
  string model = 12;
  string name = 6;
  string owner = 17;
  string road_reference = 7;
  string serial = 13;
  string site_id = 18;
}

message RsuStateLinearReference {
  string route_designator = 1;
  string direction = 2;
  string measure = 3;
  string lrs_method = 4;
}

message Operating {
  OperatingConfig config = 1;
  OperatingState state = 2;
}

message OperatingConfig {
  TimeSource configured_time_source = 1;
  string mode = 2;
}

enum TimeSource {
  TIME_SOURCE_GPS = 0;
  TIME_SOURCE_NTP = 1;
  TIME_SOURCE_LOCAL = 2;
  TIME_SOURCE_GNSS_PPS = 3;
  TIME_SOURCE_PTP = 4;
}

message OperatingState {
  string active_mode = 1;
  bool time_valid = 2;
  bool holdover = 3;
}

message Gnss {
  SurveyedPosition surveyed_position = 1;
}

message SurveyedPosition {
  string latitude = 1;
  string longitude = 2;
}

message StoreForward {
  StoreForwardConfig config = 1;
  StoreForwardState state = 2;
}

message StoreForwardConfig {
  bool enabled = 1;
  uint32 max_messages = 2;
  uint32 max_age = 3;
  bool forward_on_connect = 4;
}

message StoreForwardState {
  uint32 stored_messages = 1;
  uint32 storage_used_percent = 2;
  uint64 messages_forwarded_today = 3;
  uint32 oldest_message_age = 4;
}

message Diagnostics {
  Radio radio = 15;
  SpatSync spat_sync = 16;
  Resources resources = 17;
  OpenitsRsuGpsFixStatus gps_status = 18;
  uint32 satellites_visible = 19;
  string hdop = 1;
  bool pps_present = 2;
  string position_deviation_m = 3;
  TimeSource time_source = 20;
  uint32 time_accuracy_us = 21;
  BackhaulCellular backhaul_cellular = 4;
  string config_hash = 27;
  string last_restart_reason = 28;
  google.protobuf.Timestamp last_restart_time = 29;
  Logs logs = 23;
  repeated Process process = 24;
  uint32 restart_count = 30;
  repeated TemperatureSensor temperature_sensor = 25;
  uint64 uptime_seconds = 31;
  VehicleAnalytics vehicle_analytics = 26;
}

message Radio {
  int32 rssi_dbm = 1;
  int32 noise_floor_dbm = 2;
  int32 snr_db = 3;
  uint64 crc_errors = 11;
  bool operational = 13;
  string fault_type = 14;
  google.protobuf.Timestamp last_successful_tx = 16;
}

message SpatSync {
  uint32 asc_poll_interval_ms = 2;
  google.protobuf.Timestamp last_asc_update = 3;
  uint32 phase_mismatch_count = 4;
  uint32 timing_mismatch_count = 5;
  uint64 total_spat_generated = 6;
  uint32 sync_quality_pct = 7;
  uint32 avg_data_age_ms = 8;
  uint32 min_yellow_violation = 9;
  uint32 max_green_exceeded = 10;
  uint32 phase_gap_errors = 11;
}

message Resources {
  Cpu cpu = 1;
  Disk disk = 2;
  Memory memory = 3;
}

message Cpu {
  uint32 usage_pct = 1;
  string temperature_c = 2;
  string load_1min = 3;
  string load_5min = 4;
  string load_15min = 5;
  bool alarm = 6;
}

message Disk {
  uint64 total_kb = 1;
  uint64 used_kb = 2;
  uint64 free_kb = 3;
  uint32 usage_pct = 4;
  bool alarm = 5;
}

message Memory {
  uint64 total_kb = 1;
  uint64 used_kb = 2;
  uint64 free_kb = 3;
  uint32 usage_pct = 4;
  bool alarm = 5;
}

enum OpenitsRsuGpsFixStatus {
  OPENITS_RSU_GPS_FIX_STATUS_NO_FIX = 0;
  OPENITS_RSU_GPS_FIX_STATUS_FIX_2D = 1;
  OPENITS_RSU_GPS_FIX_STATUS_FIX_3D = 2;
  OPENITS_RSU_GPS_FIX_STATUS_DGPS = 3;
  OPENITS_RSU_GPS_FIX_STATUS_RTK = 4;
}

message BackhaulCellular {
  bool operational = 1;
  string operator_name = 2;
  SignalQuality signal_quality = 3;
  int32 rsrp_dbm = 4;
  int32 rsrq_db = 5;
  int32 sinr_db = 6;
  string lte_band = 7;
  string nr_band = 8;
  uint64 data_usage_bytes = 9;
  bool roaming = 10;
}

enum SignalQuality {
  SIGNAL_QUALITY_EXCELLENT = 0;
  SIGNAL_QUALITY_GOOD = 1;
  SIGNAL_QUALITY_FAIR = 2;
  SIGNAL_QUALITY_POOR = 3;
  SIGNAL_QUALITY_NONE = 4;
}

message Logs {
  uint64 total_entries = 1;
  Errors errors = 2;
  Warnings warnings = 3;
  Critical critical = 4;
  string most_recent_error = 5;
  google.protobuf.Timestamp most_recent_error_time = 6;
  uint32 storage_used_pct = 7;
}

message Errors {
  uint64 count_1h = 1;
  uint64 count_24h = 2;
}

message Warnings {
  uint64 count_1h = 1;
  uint64 count_24h = 2;
}

message Critical {
  uint64 count_1h = 1;
  uint64 count_24h = 2;
}

message Process {
  string name = 1;
  uint32 pid = 2;
  string state = 3;
  uint32 cpu_usage_pct = 4;
  uint64 memory_kb = 5;
  uint64 uptime_seconds = 6;
  uint32 restart_count = 7;
  google.protobuf.Timestamp last_restart = 8;
  bool required = 9;
}

message TemperatureSensor {
  uint32 id = 1;
  string name = 2;
  string temperature_c = 3;
  string status = 4;
  string threshold_high_c = 5;
  string threshold_low_c = 6;
}

message VehicleAnalytics {
  SampleBasis sample_basis = 5;
  Counts counts = 1;
  SpeedMetrics speed_metrics = 2;
  VehicleClassBreakdown vehicle_class_breakdown = 3;
  repeated Approach approach = 4;
}

message SampleBasis {
  WindowType window_type = 1;
  uint32 stats_window_seconds = 2;
  uint32 sample_count = 3;
  string penetration_estimate_pct = 4;
  google.protobuf.Timestamp computed_at = 5;
}

enum WindowType {
  WINDOW_TYPE_ROLLING = 0;
  WINDOW_TYPE_TUMBLING = 1;
}

message Counts {
  CountBasis count_basis = 4;
  uint32 vehicles_1min = 1;
  uint32 vehicles_1hr = 2;
  uint32 vehicles_24hr = 3;
}

enum CountBasis {
  COUNT_BASIS_UNIQUE_DEDUPLICATED = 0;
  COUNT_BASIS_OBSERVATION_SESSIONS = 1;
  COUNT_BASIS_RAW_MESSAGES = 2;
}

message SpeedMetrics {
  string average_kmh = 1;
  string median_kmh = 2;
  string percentile_85_kmh = 3;
  string percentile_95_kmh = 4;
}

message VehicleClassBreakdown {
  uint32 passenger_pct = 1;
  uint32 truck_pct = 2;
  uint32 emergency_pct = 3;
  uint32 transit_pct = 4;
}

message Approach {
  uint32 number = 1;
  uint32 vehicles_1min = 2;
  string average_speed_kmh = 3;
  uint32 queue_vehicles = 4;
}

message System {
  repeated CommLink comm_link = 1;
}

message CommLink {
  uint64 bytes_received = 1;
  uint64 bytes_sent = 2;
  uint32 error_count = 3;
  google.protobuf.Timestamp last_successful = 4;
  uint32 latency_ms = 5;
  uint32 link_id = 6;
  string link_type = 7;
  bool operational = 8;
  string remote_address = 9;
}

message Faults {
  repeated Fault fault = 1;
}

message Fault {
  string category = 1;
  string correlates_with = 2;
  string description = 3;
  string fault_id = 4;
  google.protobuf.Timestamp first_observed = 5;
  FaultSeverity severity = 6;
}

enum FaultSeverity {
  FAULT_SEVERITY_INFO = 0;
  FAULT_SEVERITY_WARNING = 1;
  FAULT_SEVERITY_MINOR = 2;
  FAULT_SEVERITY_MAJOR = 3;
  FAULT_SEVERITY_CRITICAL = 4;
}

message Channels {
  string reported_radio_tech = 3;
  repeated Channel channel = 1;
}

message Channel {
  string channel_id = 6;
  string radio_tech = 7;
  ChannelConfig config = 9;
  ChannelState state = 10;
}

message ChannelConfig {
  uint32 dsrc_channel_number = 7;
  bool enabled = 1;
  string mode = 2;
  int32 tx_power = 3;
  string antenna_gain_dbi = 8;
  repeated string message_types = 4;
  bool primary = 5;
  Dcc dcc = 6;
}

message Dcc {
  Policy policy = 1;
  uint32 cbr_target_percent = 2;
}

enum Policy {
  POLICY_DISABLED = 0;
  POLICY_REACTIVE = 1;
  POLICY_ADAPTIVE = 2;
}

message ChannelState {
  bool operational = 1;
  string radio_tech = 15;
  uint64 packets_tx = 2;
  uint64 packets_rx = 3;
  uint64 bytes_tx = 4;
  uint64 bytes_rx = 5;
  uint32 tx_errors = 6;
  uint32 rx_errors = 7;
  uint32 channel_busy_ratio = 8;
  int32 tx_power_dbm = 9;
  string fault_type = 10;
  uint32 tx_queue_depth = 11;
  uint64 tx_failures = 12;
  uint64 rx_decode_errors = 13;
  uint64 security_failures = 14;
}

message Messages {
  Spat spat = 2;
  Map map = 3;
  Tim tim = 4;
  Bsm bsm = 5;
  Psm psm = 6;
  Rtcm rtcm = 1;
  SrmSsm srm_ssm = 7;
  MessageStats message_stats = 8;
  MessageErrors message_errors = 9;
}

message Spat {
  SpatConfig config = 1;
  SpatState state = 2;
}

message SpatConfig {
  bool enabled = 1;
  uint32 broadcast_interval = 2;
  uint32 max_data_age_ms = 6;
  string source_asc = 3;
  SourceMode source_mode = 4;
  SpatConfigIngest ingest = 8;
  repeated SpatConfigIntersection intersection = 7;
  bool include_timing_prediction = 5;
  uint32 psid = 9;
}

enum SourceMode {
  SOURCE_MODE_RSU_GENERATED = 0;
  SOURCE_MODE_IMMEDIATE_FORWARD_INGEST = 1;
}

message SpatConfigIngest {
  Transport transport = 1;
  string address = 2;
  uint32 port = 3;
  uint32 psid = 4;
}

enum Transport {
  TRANSPORT_UDP = 0;
  TRANSPORT_TCP = 1;
  TRANSPORT_MQTT = 2;
}

message SpatConfigIntersection {
  uint32 id = 1;
  uint32 region = 2;
}

message SpatState {
  bool broadcasting = 1;
  uint64 broadcast_count = 2;
  google.protobuf.Timestamp last_broadcast = 3;
  bool asc_connected = 4;
  bool halted_stale = 5;
}

message Map {
  MapConfig config = 1;
  MapState state = 2;
}

message MapConfig {
  bool enabled = 1;
  uint32 broadcast_interval = 2;
  repeated MapConfigIntersection intersection = 4;
  uint32 geometry_version = 3;
  uint32 psid = 5;
  SourceMode source_mode = 6;
  MapConfigIngest ingest = 7;
  uint32 max_data_age_ms = 8;
}

message MapConfigIntersection {
  uint32 id = 1;
  uint32 region = 2;
}

message MapConfigIngest {
  Transport transport = 1;
  string address = 2;
  uint32 port = 3;
  uint32 psid = 4;
}

message MapState {
  bool broadcasting = 1;
  uint64 broadcast_count = 2;
  repeated MapStateIntersection intersection = 6;
  uint32 lane_count = 4;
  uint32 approach_count = 5;
}

message MapStateIntersection {
  uint32 id = 1;
  uint32 region = 2;
}

message Tim {
  TimConfig config = 1;
  Active active = 2;
}

message TimConfig {
  bool enabled = 1;
  uint32 max_active_messages = 2;
  bool suppress_expired = 3;
}

message Active {
  repeated Message message = 10;
}

message Message {
  string id = 1;
  MessageConfig config = 2;
  MessageState state = 3;
}

message MessageConfig {
  string name = 1;
  uint32 psid = 10;
  bool enabled = 2;
  uint32 priority = 3;
  google.protobuf.Timestamp start_time = 4;
  uint32 duration_minutes = 11;
  repeated uint32 itis_code = 9;
  string text = 7;
  Region region = 8;
}

message Region {
  uint32 radius = 1;
  uint32 direction = 2;
  uint32 direction_tolerance = 3;
  string elevation = 4;
  uint32 heading = 5;
  string latitude = 6;
  string longitude = 7;
}

message MessageState {
  uint64 broadcast_count = 1;
  google.protobuf.Timestamp last_broadcast = 2;
  bool broadcasting = 3;
  bool expired = 4;
}

message Bsm {
  BsmConfig config = 1;
  BsmState state = 2;
}

message BsmConfig {
  bool receive_enabled = 1;
  uint32 psid = 7;
  bool forward_enabled = 2;
  string forward_destination = 3;
  uint32 forward_port = 4;
  ForwardProtocol forward_protocol = 8;
  ForwardFormat forward_format = 9;
  bool strip_path_history = 10;
  bool filter_by_region = 5;
  uint32 region_radius = 6;
}

enum ForwardProtocol {
  FORWARD_PROTOCOL_UDP = 0;
  FORWARD_PROTOCOL_TCP = 1;
  FORWARD_PROTOCOL_MQTT = 2;
}

enum ForwardFormat {
  FORWARD_FORMAT_UPER_1609DOT2 = 0;
  FORWARD_FORMAT_UPER_BARE = 1;
  FORWARD_FORMAT_HEX = 2;
  FORWARD_FORMAT_JSON = 3;
}

message BsmState {
  uint64 received_count = 1;
  uint64 forwarded_count = 2;
  uint32 unique_vehicles_1min = 3;
  uint32 unique_vehicles_1hr = 4;
  string average_speed = 5;
  google.protobuf.Timestamp last_received = 6;
}

message Psm {
  PsmConfig config = 1;
  PsmState state = 2;
  BroadcastConfig broadcast_config = 3;
  BroadcastState broadcast_state = 4;
}

message PsmConfig {
  bool enabled = 1;
  bool alert_asc = 2;
  uint32 psid = 3;
}

message PsmState {
  uint64 received_count = 1;
  uint32 pedestrians_detected_1min = 2;
  uint32 pedestrians_detected_1hr = 3;
  google.protobuf.Timestamp last_received = 4;
  uint64 invalid_count = 5;
}

message BroadcastConfig {
  bool enabled = 1;
  string source = 2;
  uint32 broadcast_interval = 3;
  uint32 psid = 4;
}

message BroadcastState {
  bool broadcasting = 1;
  uint64 broadcast_count = 2;
  google.protobuf.Timestamp last_broadcast = 3;
}

message Rtcm {
  RtcmConfig config = 1;
  RtcmState state = 2;
}

message RtcmConfig {
  bool enabled = 1;
  string source_url = 2;
  repeated uint32 message_set = 3;
  uint32 broadcast_interval = 4;
  uint32 psid = 5;
}

message RtcmState {
  bool broadcasting = 1;
  uint64 broadcast_count = 2;
  google.protobuf.Timestamp last_broadcast = 3;
}

message SrmSsm {
  SrmSsmConfig config = 1;
  SrmSsmState state = 2;
  ActiveRequests active_requests = 3;
  Decisions decisions = 4;
}

message SrmSsmConfig {
  uint32 psid = 9;
  bool srm_receive_enabled = 1;
  bool ssm_broadcast_enabled = 2;
  bool forward_to_asc = 3;
  string asc_device = 4;
  GrantAuthority grant_authority = 7;
  bool evp_auto_grant = 8;
  bool auto_approve_tsp = 5;
  uint32 max_active_requests = 6;
}

enum GrantAuthority {
  GRANT_AUTHORITY_CONTROLLER_PRS = 0;
  GRANT_AUTHORITY_RSU_LOCAL = 1;
  GRANT_AUTHORITY_OPERATOR = 2;
}

message SrmSsmState {
  uint64 srm_received = 1;
  uint64 ssm_broadcast = 2;
  uint32 active_requests = 3;
  uint64 approved_requests = 4;
  uint64 denied_requests = 5;
}

message ActiveRequests {
  repeated Request request = 1;
}

message Request {
  string id = 1;
  string vehicle_id = 2;
  string request_type = 3;
  uint32 approach = 4;
  uint32 eta_seconds = 5;
  google.protobuf.Timestamp received_at = 6;
  OpenitsRsuSrmRequestStatus status = 7;
  uint32 priority = 8;
  string vehicle_class = 9;
  OpenitsRsuDecisionAuthority decision_authority = 10;
  string denial_reason = 11;
}

enum OpenitsRsuSrmRequestStatus {
  OPENITS_RSU_SRM_REQUEST_STATUS_PENDING = 0;
  OPENITS_RSU_SRM_REQUEST_STATUS_APPROVED = 1;
  OPENITS_RSU_SRM_REQUEST_STATUS_ACTIVE = 2;
  OPENITS_RSU_SRM_REQUEST_STATUS_COMPLETED = 3;
  OPENITS_RSU_SRM_REQUEST_STATUS_DENIED = 4;
}

enum OpenitsRsuDecisionAuthority {
  OPENITS_RSU_DECISION_AUTHORITY_NONE = 0;
  OPENITS_RSU_DECISION_AUTHORITY_CONTROLLER_PRS = 1;
  OPENITS_RSU_DECISION_AUTHORITY_RSU_LOCAL = 2;
  OPENITS_RSU_DECISION_AUTHORITY_OPERATOR = 3;
  OPENITS_RSU_DECISION_AUTHORITY_EVP_AUTO = 4;
}

message Decisions {
  repeated Decision decision = 1;
}

message Decision {
  string request_id = 1;
  Action action = 2;
  string reason = 3;
}

enum Action {
  ACTION_APPROVE = 0;
  ACTION_DENY = 1;
}

message MessageStats {
  repeated PerMessageType per_message_type = 1;
}

message PerMessageType {
  string message_type = 1;
  uint32 psid = 13;
  uint32 queue_depth = 2;
  uint64 tx_count = 3;
  uint64 rx_count = 4;
  uint64 success = 7;
  uint64 invalid = 8;
  uint32 avg_latency_ms = 9;
  uint32 rate_per_sec = 10;
  uint64 encoding_errors = 11;
  uint64 decoding_errors = 12;
}

message MessageErrors {
  MessageErrorsSecurity security = 1;
  Drops drops = 2;
  uint64 asc_data_errors = 3;
}

message MessageErrorsSecurity {
  uint64 sign_failures = 1;
  uint64 verify_failures = 2;
  uint64 cert_errors = 3;
}

message Drops {
  uint64 queue = 1;
  uint64 timeout = 2;
  uint64 congestion = 3;
}

message RsuSecurity {
  RsuSecurityConfig config = 1;
  RsuSecurityState state = 2;
  Certificates certificates = 3;
}

message RsuSecurityConfig {
  bool security_enabled = 1;
  string scms_url = 2;
  bool auto_renewal = 3;
  uint32 renewal_days_before_expiry = 4;
  bool permit_unsigned_broadcast = 6;
  RsuSecurityConfigMisbehaviorReporting misbehavior_reporting = 5;
}

message RsuSecurityConfigMisbehaviorReporting {
  bool enabled = 1;
  string authority_url = 2;
  uint32 min_reports_to_send = 3;
}

message RsuSecurityState {
  bool scms_connected = 1;
  google.protobuf.Timestamp last_scms_contact = 2;
  EnrollmentStatus enrollment_status = 3;
  uint32 pseudonym_certs_available = 4;
  uint32 pseudonym_certs_used = 5;
  uint32 app_certs_available = 6;
  int32 days_to_app_cert_expiry = 20;
  bool app_cert_renewal_active = 21;
  int32 days_to_enrollment_expiry = 7;
  int32 days_to_pseudonym_expiry = 8;
  google.protobuf.Timestamp earliest_cert_expiry = 9;
  google.protobuf.Timestamp last_cert_download = 10;
  uint64 certs_downloaded_total = 11;
  uint64 cert_download_failures = 12;
  uint32 cert_download_queue = 13;
  google.protobuf.Timestamp last_crl_update = 14;
  uint32 crl_entries = 15;
  google.protobuf.Timestamp next_crl_due = 18;
  bool crl_overdue = 19;
  string lpf_version = 23;
  string lccf_version = 24;
  google.protobuf.Timestamp policy_files_last_updated = 25;
  uint64 revocation_checks = 16;
  uint64 revocation_rejections = 17;
  RsuSecurityStateMisbehaviorReporting misbehavior_reporting = 22;
}

enum EnrollmentStatus {
  ENROLLMENT_STATUS_NOT_ENROLLED = 0;
  ENROLLMENT_STATUS_ENROLLING = 1;
  ENROLLMENT_STATUS_ENROLLED = 2;
  ENROLLMENT_STATUS_ERROR = 3;
  ENROLLMENT_STATUS_EXPIRED = 4;
  ENROLLMENT_STATUS_REVOKED = 5;
}

message RsuSecurityStateMisbehaviorReporting {
  uint64 reports_generated = 1;
  uint64 reports_sent = 2;
  uint32 reports_pending = 3;
  google.protobuf.Timestamp last_report_sent = 4;
}

message Certificates {
  repeated Certificate certificate = 1;
}

message Certificate {
  string id = 1;
  CertificateState state = 2;
}

message CertificateState {
  Type type = 1;
  string status = 2;
  google.protobuf.Timestamp valid_from = 3;
  google.protobuf.Timestamp valid_until = 4;
  int32 days_until_expiry = 5;
  repeated Permissions permissions = 6;
  GeographicValidity geographic_validity = 7;
}

enum Type {
  TYPE_ENROLLMENT = 0;
  TYPE_PSEUDONYM = 1;
  TYPE_APPLICATION = 2;
  TYPE_IDENTIFICATION = 3;
}

message Permissions {
  uint32 psid = 1;
  string ssp = 2;
}

message GeographicValidity {
  RegionType region_type = 1;
  uint32 identified_region_id = 2;
  CircularRegion circular_region = 3;
}

enum RegionType {
  REGION_TYPE_NONE = 0;
  REGION_TYPE_CIRCULAR = 1;
  REGION_TYPE_RECTANGULAR = 2;
  REGION_TYPE_POLYGONAL = 3;
  REGION_TYPE_IDENTIFIED = 4;
}

message CircularRegion {
  uint32 radius_m = 1;
  string latitude = 2;
  string longitude = 3;
}


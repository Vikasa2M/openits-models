syntax = "proto3";

package openits.ess.v1;

option go_package = "github.com/openits/openits-models/pkg/proto/openits/ess/v1;essv1";

import "google/protobuf/timestamp.proto";

message Station {
  StationConfig config = 1;
  StationState state = 2;
  Configuration configuration = 10;
  Atmospheric atmospheric = 3;
  Precipitation precipitation = 4;
  Visibility visibility = 5;
  Pavement pavement = 6;
  Radiation radiation = 7;
  Diagnostics diagnostics = 8;
  Faults faults = 9;
}

message StationConfig {
  string elevation = 7;
  uint32 heading = 8;
  string id = 9;
  google.protobuf.Timestamp install_date = 1;
  string latitude = 2;
  StationConfigLinearReference linear_reference = 6;
  string longitude = 3;
  string maintained_by = 10;
  string name = 4;
  string owner = 11;
  string road_reference = 5;
  string site_id = 12;
}

message StationConfigLinearReference {
  string route_designator = 1;
  string direction = 2;
  string measure = 3;
  string lrs_method = 4;
}

message StationState {
  string elevation = 11;
  string firmware = 2;
  string firmware_build = 14;
  string hardware_version = 15;
  uint32 heading = 12;
  string id = 13;
  google.protobuf.Timestamp install_date = 1;
  string latitude = 3;
  StationStateLinearReference linear_reference = 10;
  string longitude = 4;
  string maintained_by = 16;
  string make = 5;
  string model = 6;
  string name = 7;
  string owner = 17;
  string road_reference = 8;
  string serial = 9;
  string site_id = 18;
}

message StationStateLinearReference {
  string route_designator = 1;
  string direction = 2;
  string measure = 3;
  string lrs_method = 4;
}

message Configuration {
  string wind_sensor_height_m = 1;
  string air_temperature_sensor_height_m = 2;
  string visibility_sensor_height_m = 3;
}

message Atmospheric {
  string air_temperature_c = 1;
  string dewpoint_c = 2;
  string humidity_percent = 3;
  string pressure_hpa = 4;
  string wind_speed_ms = 5;
  string wind_speed_avg_ms = 10;
  string wind_gust_ms = 6;
  string wind_direction_deg = 7;
  string wind_direction_avg_deg = 12;
  google.protobuf.Timestamp observed_at = 8;
  Quality quality = 11;
  string sensor_id = 9;
}

enum Quality {
  QUALITY_VALID = 0;
  QUALITY_SUSPECT = 1;
  QUALITY_ESTIMATED = 2;
  QUALITY_NOT_INSTALLED = 3;
  QUALITY_MISSING = 4;
}

message Precipitation {
  PrecipitationType type = 1;
  PrecipitationIntensity intensity = 2;
  string rate_mm_h = 3;
  string accumulated_mm = 4;
  string accumulated_1h_mm = 8;
  string accumulated_24h_mm = 9;
  string snow_depth_mm = 10;
  string snow_rate_mm_h = 11;
  google.protobuf.Timestamp observed_at = 5;
  Quality quality = 7;
  string sensor_id = 6;
}

enum PrecipitationType {
  PRECIPITATION_TYPE_UNKNOWN = 0;
  PRECIPITATION_TYPE_NONE = 1;
  PRECIPITATION_TYPE_RAIN = 2;
  PRECIPITATION_TYPE_SNOW = 3;
  PRECIPITATION_TYPE_SLEET = 4;
  PRECIPITATION_TYPE_HAIL = 5;
  PRECIPITATION_TYPE_DRIZZLE = 6;
  PRECIPITATION_TYPE_OTHER = 7;
  PRECIPITATION_TYPE_FREEZING_RAIN = 8;
  PRECIPITATION_TYPE_FREEZING_DRIZZLE = 9;
  PRECIPITATION_TYPE_ICE_CRYSTALS = 10;
  PRECIPITATION_TYPE_MIXED = 11;
}

enum PrecipitationIntensity {
  PRECIPITATION_INTENSITY_UNKNOWN = 0;
  PRECIPITATION_INTENSITY_NONE = 1;
  PRECIPITATION_INTENSITY_LIGHT = 2;
  PRECIPITATION_INTENSITY_MODERATE = 3;
  PRECIPITATION_INTENSITY_HEAVY = 4;
  PRECIPITATION_INTENSITY_VIOLENT = 5;
}

message Visibility {
  uint32 range_m = 1;
  VisibilitySituation situation = 2;
  google.protobuf.Timestamp observed_at = 3;
  Quality quality = 5;
  string sensor_id = 4;
}

enum VisibilitySituation {
  VISIBILITY_SITUATION_UNKNOWN = 0;
  VISIBILITY_SITUATION_CLEAR = 1;
  VISIBILITY_SITUATION_FOG = 2;
  VISIBILITY_SITUATION_HEAVY_FOG = 3;
  VISIBILITY_SITUATION_SMOKE = 4;
  VISIBILITY_SITUATION_BLOWING_SNOW = 5;
  VISIBILITY_SITUATION_BLOWING_DUST = 6;
  VISIBILITY_SITUATION_HEAVY_RAIN = 7;
  VISIBILITY_SITUATION_HEAVY_SNOW = 8;
}

message Pavement {
  repeated PavementSensor sensor = 1;
}

message PavementSensor {
  string sensor_id = 1;
  PavementSensorConfig config = 2;
  PavementSensorState state = 3;
}

message PavementSensorConfig {
  string lane_reference = 1;
  SensingMethod sensing_method = 3;
  string sensor_id = 2;
}

enum SensingMethod {
  SENSING_METHOD_EMBEDDED = 0;
  SENSING_METHOD_NON_INVASIVE_REMOTE = 1;
  SENSING_METHOD_UNKNOWN = 2;
}

message PavementSensorState {
  google.protobuf.Timestamp observed_at = 1;
  string surface_temperature_c = 2;
  PavementCondition condition = 3;
  string freeze_point_c = 4;
  string water_depth_mm = 5;
  uint32 salinity_ppm = 6;
  string grip_coefficient = 11;
  string chemical_percent = 12;
  string chemical_factor = 13;
  string ice_depth_mm = 14;
  string subsurface_temperature_c = 7;
  uint32 subsurface_depth_mm = 8;
  string lane_reference = 9;
  SensingMethod sensing_method = 15;
  string sensor_id = 10;
}

enum PavementCondition {
  PAVEMENT_CONDITION_UNKNOWN = 0;
  PAVEMENT_CONDITION_DRY = 1;
  PAVEMENT_CONDITION_TRACE_MOISTURE = 2;
  PAVEMENT_CONDITION_WET = 3;
  PAVEMENT_CONDITION_CHEMICALLY_WET = 4;
  PAVEMENT_CONDITION_ICE_WARNING = 5;
  PAVEMENT_CONDITION_ICE_WATCH = 6;
  PAVEMENT_CONDITION_SNOW_WARNING = 7;
  PAVEMENT_CONDITION_SNOW_WATCH = 8;
  PAVEMENT_CONDITION_ABSORPTION = 9;
  PAVEMENT_CONDITION_FROST = 10;
  PAVEMENT_CONDITION_DEW = 11;
  PAVEMENT_CONDITION_ERROR = 12;
}

message Radiation {
  string solar_radiation_wm2 = 1;
  string solar_radiation_hourly_avg_wm2 = 2;
  google.protobuf.Timestamp observed_at = 3;
  Quality quality = 5;
  string sensor_id = 4;
}

message Diagnostics {
  repeated DiagnosticsSensor sensor = 1;
}

message DiagnosticsSensor {
  string sensor_id = 1;
  DiagnosticsSensorConfig config = 2;
  DiagnosticsSensorState state = 3;
}

message DiagnosticsSensorConfig {
  uint32 sample_interval_s = 1;
  string sensor_id = 2;
}

message DiagnosticsSensorState {
  string type = 1;
  SensorHealth health = 2;
  google.protobuf.Timestamp last_observation = 3;
  google.protobuf.Timestamp last_calibration = 4;
  google.protobuf.Timestamp next_calibration = 5;
  uint32 sample_interval_s = 6;
  string sensor_id = 7;
}

enum SensorHealth {
  SENSOR_HEALTH_OK = 0;
  SENSOR_HEALTH_STALE = 1;
  SENSOR_HEALTH_UNCALIBRATED = 2;
  SENSOR_HEALTH_DEGRADED = 3;
  SENSOR_HEALTH_FAILED = 4;
  SENSOR_HEALTH_DISABLED = 5;
}

message Faults {
  repeated Fault fault = 1;
}

message Fault {
  string category = 1;
  string correlates_with = 6;
  string description = 2;
  string fault_id = 3;
  google.protobuf.Timestamp first_observed = 4;
  FaultSeverity severity = 5;
}

enum FaultSeverity {
  FAULT_SEVERITY_INFO = 0;
  FAULT_SEVERITY_WARNING = 1;
  FAULT_SEVERITY_MINOR = 2;
  FAULT_SEVERITY_MAJOR = 3;
  FAULT_SEVERITY_CRITICAL = 4;
}


syntax = "proto3";

package openits.cctv.v1;

option go_package = "github.com/openits/openits-models/pkg/proto/openits/cctv/v1;cctvv1";

import "google/protobuf/timestamp.proto";

message Camera {
  CameraConfig config = 1;
  CameraState state = 2;
  Mounting mounting = 3;
  Ptz ptz = 4;
  Streams streams = 5;
  Environment environment = 6;
  Faults faults = 7;
  Control control = 8;
}

message CameraConfig {
  string elevation = 1;
  uint32 heading = 2;
  string id = 3;
  string latitude = 4;
  string longitude = 5;
  string name = 6;
  string road_reference = 7;
}

message CameraState {
  string elevation = 1;
  string firmware = 2;
  string firmware_build = 3;
  string hardware_version = 4;
  uint32 heading = 5;
  string id = 6;
  string latitude = 7;
  string longitude = 8;
  string make = 9;
  string model = 10;
  string name = 11;
  string road_reference = 12;
  string serial = 13;
}

message Mounting {
  MountingStructure structure = 1;
  string height_m = 2;
  repeated string co_located_device = 3;
}

enum MountingStructure {
  MOUNTING_STRUCTURE_POLE = 0;
  MOUNTING_STRUCTURE_MAST_ARM = 1;
  MOUNTING_STRUCTURE_SPAN_WIRE = 2;
  MOUNTING_STRUCTURE_STRUCTURE = 3;
  MOUNTING_STRUCTURE_BUILDING = 4;
  MOUNTING_STRUCTURE_OTHER = 5;
}

message Ptz {
  Capabilities capabilities = 1;
  PtzState state = 2;
  Presets presets = 3;
  Tours tours = 4;
}

message Capabilities {
  bool ptz_capable = 1;
  uint32 max_presets = 2;
  bool pan_continuous = 3;
}

message PtzState {
  string pan_degrees = 1;
  string tilt_degrees = 2;
  uint32 zoom_percent = 3;
  bool moving = 4;
}

message Presets {
  repeated Preset preset = 1;
  uint32 recall = 2;
  PresetsState state = 3;
}

message Preset {
  uint32 preset_id = 1;
  string name = 2;
  string pan_degrees = 3;
  string tilt_degrees = 4;
  uint32 zoom_percent = 5;
}

message PresetsState {
  uint32 active_preset = 1;
}

message Tours {
  repeated Tour tour = 1;
  uint32 run = 2;
  ToursState state = 3;
}

message Tour {
  uint32 tour_id = 1;
  string name = 2;
  repeated Stop stop = 3;
}

message Stop {
  uint32 sequence = 1;
  uint32 preset_id = 2;
  uint32 dwell_seconds = 3;
}

message ToursState {
  uint32 active_tour = 1;
  OpenitsCctvTourRunState run_state = 2;
  uint32 current_stop = 3;
}

enum OpenitsCctvTourRunState {
  OPENITS_CCTV_TOUR_RUN_STATE_STOPPED = 0;
  OPENITS_CCTV_TOUR_RUN_STATE_RUNNING = 1;
  OPENITS_CCTV_TOUR_RUN_STATE_PAUSED = 2;
}

message Streams {
  repeated Stream stream = 1;
}

message Stream {
  uint32 stream_id = 1;
  StreamConfig config = 2;
  StreamState state = 3;
}

message StreamConfig {
  VideoCodec codec = 1;
  uint32 target_bitrate_kbps = 2;
}

enum VideoCodec {
  VIDEO_CODEC_H264 = 0;
  VIDEO_CODEC_H265 = 1;
  VIDEO_CODEC_MJPEG = 2;
  VIDEO_CODEC_MPEG4 = 3;
  VIDEO_CODEC_OTHER = 4;
}

message StreamState {
  uint32 width_px = 1;
  uint32 height_px = 2;
  VideoCodec codec = 3;
  uint32 bitrate_kbps = 4;
  string frame_rate = 5;
  StreamHealth health = 6;
}

enum StreamHealth {
  STREAM_HEALTH_OK = 0;
  STREAM_HEALTH_DEGRADED = 1;
  STREAM_HEALTH_DOWN = 2;
}

message Environment {
  EnvironmentConfig config = 1;
  EnvironmentState state = 2;
}

message EnvironmentConfig {
  bool wiper = 1;
  bool washer = 2;
  HeaterMode heater_mode = 3;
}

enum HeaterMode {
  HEATER_MODE_OFF = 0;
  HEATER_MODE_ON = 1;
  HEATER_MODE_AUTO = 2;
}

message EnvironmentState {
  string enclosure_temp_c = 1;
  bool wiper_active = 2;
  bool heater_active = 3;
  bool blower_active = 4;
}

message Faults {
  repeated Fault fault = 1;
}

message Fault {
  string category = 1;
  string description = 2;
  string fault_id = 3;
  google.protobuf.Timestamp first_observed = 4;
  FaultSeverity severity = 5;
}

enum FaultSeverity {
  FAULT_SEVERITY_INFO = 0;
  FAULT_SEVERITY_WARNING = 1;
  FAULT_SEVERITY_MINOR = 2;
  FAULT_SEVERITY_MAJOR = 3;
  FAULT_SEVERITY_CRITICAL = 4;
}

message Control {
  ControlConfig config = 1;
  ControlState state = 2;
}

message ControlConfig {
  string control_mode = 1;
  ControlConfigHolder holder = 2;
}

message ControlConfigHolder {
  string requested_by = 1;
  uint32 priority = 2;
  uint32 lockout_timeout_s = 3;
}

message ControlState {
  string control_mode = 1;
  ControlStateHolder holder = 2;
}

message ControlStateHolder {
  string current_holder = 1;
  uint32 held_priority = 2;
  google.protobuf.Timestamp held_since = 3;
  google.protobuf.Timestamp expires_at = 4;
}


syntax = "proto3";

package openits.ess.v1;

option go_package = "github.com/openits/openits-models/pkg/proto/openits/v1;openitspb";

import "google/protobuf/timestamp.proto";

message SensorRecalibrated {
  string sensor_id = 1;
  string calibrated_by = 2;
  google.protobuf.Timestamp calibrated_at = 3;
}

message WeatherAlert {
  string threshold_id = 1;
  string observed_value = 2;
  string threshold_value = 3;
  string unit = 4;
  Direction direction = 5;
  string human_description = 6;
}

enum Direction {
  DIRECTION_ENTERED = 0;
  DIRECTION_EXITED = 1;
}


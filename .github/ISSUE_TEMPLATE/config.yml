blank_issues_enabled: false
contact_links:
  - name: Question or idea (Discussions)
    url: https://github.com/Vikasa2M/openits-models/discussions
    about: >
      For questions, design discussion, or "should the model support X?"
      conversations, please open a Discussion rather than an issue.
  - name: Report a security vulnerability
    url: https://github.com/Vikasa2M/openits-models/security/advisories/new
    about: >
      Do NOT open a public issue for security problems. Report privately via
      GitHub Security Advisories. See SECURITY.md.

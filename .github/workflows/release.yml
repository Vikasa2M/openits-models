name: Release

# MANUAL / BOOTSTRAP path. The normal release cadence is release-please
# (.github/workflows/release-please.yml) — merge its release PR and it tags +
# releases automatically. This workflow is the manual escape hatch: it fires
# when a maintainer PUSHES a semver tag by hand (e.g. the first v0.1.0
# bootstrap, or a one-off). It re-runs the gate, then cuts a GitHub Release
# whose notes are the matching CHANGELOG section, with the curated bundle
# attached. release-please creates its tags with GITHUB_TOKEN, which does NOT
# trigger this `on: push: tags` workflow — so the two paths never collide.
# Go module consumers pull the tag directly; the tag *is* the release.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# Read-only by default; only the `release` job below elevates to write.
# This workflow only runs on tag pushes, which only maintainers can perform.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./...

  release:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Elevated only for creating the GitHub Release + uploading assets.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Extract CHANGELOG section for this tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Pull the body between "## [<version>]" and the next "## [" header.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; next }
            grab && /^## \[/         { exit }
            grab                     { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for ${VERSION}; using tag name as body." >&2
            echo "Release ${TAG}" > release-notes.md
          fi
          echo "----- release notes -----"
          cat release-notes.md
      - name: Build curated artifact bundle
        env:
          TAG: ${{ github.ref_name }}
        run: scripts/build-release-bundle.sh "$TAG"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PRERELEASE=""
          case "$TAG" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            $PRERELEASE \
            "openits-models-${TAG}.zip" \
            "openits-models-${TAG}.tar.gz" \
            SHA256SUMS

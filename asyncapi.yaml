info:
    description: |
        Live event API for OpenITS infrastructure (signal control, DMS,
        ESS / RWIS, RSU, ramp metering, perception, traffic-sensor, and
        reversible-lane). Generated from the YANG-derived ce-type catalog
        (tools/yang-proto-gen: BuildCatalog); each message payload is that
        notification's own JSON Schema (EmitJSONSchema). Do not edit by hand —
        regenerate with `make asyncapi`.

        Envelope is CloudEvents 1.0 in binary mode (CE attributes ride in NATS
        headers; payload bytes are pure protobuf on the wire — the JSON Schema
        payload below describes that protobuf's structure for tooling, it is not
        itself the wire encoding). Transport is NATS with JetStream for durability.
    license:
        name: Apache-2.0
        url: https://www.apache.org/licenses/LICENSE-2.0
    title: OpenITS Event API
    version: 1.0.0
